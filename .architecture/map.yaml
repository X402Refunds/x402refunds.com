version: "1.2"
project: "consulate"
last_updated: "2025-09-18"
description: "Architecture mapping for Consulate AI - Agent Government OS"

# Current architecture state (source of truth)
current:
  locations:
    backend: "convex/"
    root_config: "./"
    scripts: "scripts/"
    cursor_rules: ".cursor/rules/"
    workflows: ".github/workflows/"
    architecture_map: ".architecture/"
    tests: "test/"
  
  commands:
    dev: "pnpm dev"
    deploy: "pnpm deploy" 
    build: "pnpm build"
    convex_dev: "convex dev"
    convex_deploy: "convex deploy"
    test: "pnpm test"
    test_run: "pnpm test:run"
    test_ui: "pnpm test:ui"
    test_coverage: "pnpm test:coverage"
    e2e: "pnpm e2e"
  
  patterns:
    backend_files: "convex/*.ts"
    import_paths: "convex/"
    config_files: "package.json"
    generated_api: "convex/_generated/"
    test_files: "test/*.test.ts"
    test_setup: "test/setup.ts"
    test_config: "vitest.config.ts"

# Deprecated patterns (never suggest these - they're from old architecture)
deprecated:
  locations:
    - "apps/convex/"
    - "apps/"
    - "packages/"
    - "infra/"
  commands:
    - "cd apps && pnpm dev"
    - "cd apps && pnpm deploy"
    - "cd apps && npx convex deploy"
  patterns:
    - "apps/convex/*.ts"
    - "packages/sdk-js"
    - "apps/package.json"

# Dependencies - what files need updates when architecture changes
dependency_graph:
  "locations.backend":
    description: "Backend location affects many dependent files"
    affects:
      - file: ".cursor/rules/convex-backend-architecture.mdc" 
        type: "path_references"
      - file: ".cursor/rules/convex-functions.mdc"
        type: "globs_pattern"
      - file: ".github/workflows/ci.yml"
        type: "command_paths"
      - file: "README.md"
        type: "documentation_paths"
      - file: "tsconfig.json"
        type: "include_paths"

  "commands.dev":
    description: "Development command affects documentation and workflows"
    affects:
      - file: ".cursor/rules/convex-backend-architecture.mdc"
        type: "command_examples"
      - file: "README.md"
        type: "command_documentation"
      - file: ".github/workflows/ci.yml"
        type: "build_commands"

  "locations.tests":
    description: "Test directory affects testing workflows and documentation"
    affects:
      - file: ".cursor/rules/testing-before-push.mdc"
        type: "path_references"
      - file: "vitest.config.ts"
        type: "test_configuration"
      - file: "package.json"
        type: "test_scripts"
      - file: "scripts/e2e-test.sh"
        type: "test_execution"

# Architecture principles (for validation)
principles:
  - "Pure serverless - everything in Convex functions"
  - "No external services or complex infrastructure"
  - "Single deployment model"
  - "Root-level simplicity over monorepo complexity"
  - "Zero build complexity"

# Change history (track major architecture changes)
history:
  - date: "2025-09-10"
    change: "Moved from apps/convex/ to convex/ at root level"
    reason: "Simplified structure, follows Convex conventions"
    files_affected: 15
    breaking: true
  
  - date: "2025-09-12"
    change: "Added comprehensive testing framework with Vitest and ConvexTest"
    reason: "Enable proper API testing for all court engine endpoints and business logic"
    files_affected: 8
    breaking: false
    details:
      - "Added test/ directory with 5 comprehensive test suites"
      - "Created vitest.config.ts for test configuration"
      - "Added testing commands to package.json (test, test:run, test:ui, test:coverage, e2e)"
      - "Updated testing-before-push.mdc rule to require API tests"
      - "Modernized E2E script for current Convex serverless architecture"
      - "Added vitest and convex-test dependencies"
  
  - date: "2025-09-18"
    change: "Consolidated overlapping cursor rules to reduce redundancy"
    reason: "Clean up duplicate documentation and consolidate related rules for better maintainability"
    files_affected: 5
    breaking: false
    details:
      - "Merged agent-coordination-patterns.mdc into agent-coordination-architecture.mdc"
      - "Consolidated development-workflow.mdc and agent-court-architecture.mdc into convex-backend-architecture.mdc"
      - "Removed 3 redundant rule files"
      - "Updated dependency graph to reflect new structure"
