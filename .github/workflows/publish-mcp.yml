name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]  # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate server.json syntax
        run: |
          python3 -m json.tool server.json > /dev/null
          echo "✓ server.json is valid JSON"

      - name: Update version in server.json if provided
        if: github.event.inputs.version != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          node -e "
          const fs = require('fs');
          const server = JSON.parse(fs.readFileSync('server.json', 'utf8'));
          server.version = '$VERSION';
          fs.writeFileSync('server.json', JSON.stringify(server, null, 2));
          "

      - name: Update version from tag if triggered by tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          node -e "
          const fs = require('fs');
          const server = JSON.parse(fs.readFileSync('server.json', 'utf8'));
          server.version = '$VERSION';
          fs.writeFileSync('server.json', JSON.stringify(server, null, 2));
          "

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Validate server.json against schema
        run: |
          echo "Validating server.json against MCP schema..."
          node scripts/validate-server-json.js

      - name: Verify MCP endpoints are accessible
        run: |
          echo "Checking discovery endpoint..."
          DISCOVERY_RESPONSE=$(curl -s -w "\n%{http_code}" https://api.consulatehq.com/.well-known/mcp.json)
          HTTP_CODE=$(echo "$DISCOVERY_RESPONSE" | tail -n1)
          BODY=$(echo "$DISCOVERY_RESPONSE" | head -n-1)
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Discovery endpoint returned HTTP $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
          
          TOOL_COUNT=$(echo "$BODY" | jq '.tools | length' 2>/dev/null || echo "0")
          if [ "$TOOL_COUNT" -lt "1" ]; then
            echo "❌ Discovery endpoint returned 0 tools"
            exit 1
          fi
          
          echo "✓ Discovery endpoint accessible ($TOOL_COUNT tools found)"
          
          echo "Checking invoke endpoint..."
          INVOKE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://api.consulatehq.com/mcp/invoke \
            -H "Content-Type: application/json" \
            -d '{"tool":"test","parameters":{}}')
          
          # Expect 401 (auth required) or 400 (invalid params), not 404
          if [ "$INVOKE_CODE" = "404" ]; then
            echo "❌ Invoke endpoint returned 404 (not found)"
            exit 1
          fi
          
          echo "✓ Invoke endpoint accessible (HTTP $INVOKE_CODE)"

      - name: Install MCP Publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --version

      - name: Login to MCP Registry (DNS)
        run: |
          ./mcp-publisher login dns --domain consulatehq.com --private-key "${{ secrets.MCP_DNS_PRIVATE_KEY_HEX }}"

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
        env:
          MCP_SERVER_JSON: server.json

      - name: Verify publication
        run: |
          SERVER_NAME=$(jq -r '.name' server.json)
          echo "Checking if server is published..."
          sleep 5  # Give registry time to index
          curl -s "https://registry.modelcontextprotocol.io/v0/servers?search=$SERVER_NAME" | jq -r '.servers[]?.name' | grep -q "$SERVER_NAME" && {
            echo "✓ Server successfully published to MCP registry"
          } || {
            echo "⚠️  Server may not appear in search immediately (can take a few minutes)"
          }

