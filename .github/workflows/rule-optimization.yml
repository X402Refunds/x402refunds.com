name: Rule System Optimization

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  optimize-rules:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for learning from corrections
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install anthropic
      
      - name: Run LLM Rule Optimizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/llm-rule-optimizer.js
      
      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: LLM-optimized rule system"
          branch: llm-rule-optimization
          title: "🤖 Weekly Rule System Optimization"
          body: |
            ## Automated Rule Optimization
            
            This PR was generated by Claude analyzing:
            - All rule files for semantic duplications
            - Git commit history for correction patterns
            - Rule usage patterns and outdated content
            
            ### Changes Summary
            See commit message for detailed reasoning.
            
            ### Review Checklist
            - [ ] Duplications removed appropriately
            - [ ] Merged content makes sense
            - [ ] No critical rules lost
            - [ ] Contradictions resolved
            
            **Generated by**: `.github/workflows/rule-optimization.yml`
          delete-branch: true
