name: Weekly Rule Optimization

on:
  schedule:
    # Every Monday at 2am UTC
    - cron: '0 2 * * 1'
  workflow_dispatch: # Manual trigger

env:
  NODE_VERSION: '20'

jobs:
  optimize-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect semantic duplicates
        id: detect
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: anthropic
        run: |
          echo "Running LLM-powered semantic analysis..."
          pnpm rules:llm-detect > optimization-report.txt
          cat optimization-report.txt

      - name: Create optimization PR
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: weekly rule optimization recommendations'
          title: '🤖 Weekly Rule Optimization Report'
          body: |
            ## 🤖 Automated Rule Optimization Analysis
            
            This PR contains recommendations from LLM analysis of rule duplication and optimization opportunities.
            
            **Analysis Date**: ${{ github.event.repository.updated_at }}
            **Provider**: Claude (Anthropic)
            
            ### 📊 Report
            
            ```
            $(cat optimization-report.txt)
            ```
            
            ### 🎯 Next Steps
            
            Review the recommendations and run specific commands:
            
            ```bash
            # Compress a verbose rule
            pnpm rules:llm-compress <filename>
            
            # Merge duplicate rules
            pnpm rules:llm-merge <file1> <file2> <new-name>
            ```
            
            **Note**: This PR only contains the analysis report. Apply recommendations manually after review.
          branch: chore/rule-optimization-${{ github.run_number }}
          base: main
          labels: automated, rules, optimization
          assignees: ${{ github.actor }}

      - name: Upload optimization report
        uses: actions/upload-artifact@v3
        with:
          name: rule-optimization-report
          path: optimization-report.txt